name: GitQuest
options:
  bundleIdPrefix: com.gitquest
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  GitQuest:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GitQuest
        excludes:
          - Info.plist
    info:
      path: GitQuest/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gitquest.app
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
    scheme:
      testTargets:
        - GitQuestTests
        - GitQuestUITests
  GitQuestTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GitQuestTests
    dependencies:
      - target: GitQuest
    settings:
      base:
        SWIFT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: YES
  GitQuestUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GitQuestUITests
    dependencies:
      - target: GitQuest
    settings:
      base:
        SWIFT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: GitQuest
