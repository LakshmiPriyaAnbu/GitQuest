<div class="app-shell">
  <div class="dot-texture"></div>

  @if (viewport.isDesktop()) {
    <gq-sidebar></gq-sidebar>
  }

  <div class="app-main">
    <gq-header></gq-header>
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
    @if (viewport.isMobile()) {
      <gq-mobile-nav></gq-mobile-nav>
    }
  </div>

  <gq-toast-container></gq-toast-container>
</div>
