<section class="gq-screen">
  <div class="quest-list">
    @for (q of vm.rows(); track q.id) {
      <div class="quest-card" [class.quest-done]="q.isDone" [class.quest-locked]="q.locked">
        <div class="quest-top">
          <span class="quest-diff" [class]="q.difficultyClass">{{ q.difficulty }}</span>
          @if (q.isDone) {
            <span class="quest-status quest-status-done">{{ q.statusLabel }}</span>
          } @else if (q.available) {
            <span class="quest-status quest-status-available">{{ q.statusLabel }}</span>
          } @else {
            <span class="quest-status quest-status-locked">{{ q.statusLabel }}</span>
          }
        </div>
        <div class="quest-title">{{ q.title }}</div>
        <div class="quest-meta">{{ q.minutes }} min · {{ q.xp }} XP · <span class="mono">{{ q.hint }}</span></div>
        <button class="gq-btn gq-btn-primary gq-btn-sm quest-btn" [disabled]="q.locked" (click)="vm.start(q.route)">
          {{ q.ctaLabel }}
        </button>
      </div>
    }
  </div>
</section>
